version: '3.8'

services:
  whisper:
    image: fedirz/faster-whisper-server:latest-cuda
    container_name: chatterbox-whisper-gpu
    ports:
      - "8000:8000"
    environment:
      - WHISPER_MODEL=base
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - whisper_models:/root/.cache/huggingface

  ollama:
    image: ollama/ollama:latest
    container_name: chatterbox-ollama-gpu
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ollama_data:/root/.ollama
    # Automatically pull the micro-model on startup
    entrypoint: /bin/sh -c "ollama serve & sleep 5 && ollama pull qwen2.5:0.5b && wait"

volumes:
  whisper_models:
  ollama_data:
